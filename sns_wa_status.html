<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS Offers – WhatsApp Status</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0d1a10;
    min-height: 100vh;
    color: #fff;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1050, #1a5228);
    padding: 18px 24px 14px;
    text-align: center;
    border-bottom: 3px solid #3ea84f;
    position: sticky; top: 0; z-index: 100;
  }
  .header img { height: 40px; display: block; margin: 0 auto 8px; }
  .header p {
    font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header h1 { font-size: 16px; color: #5be07a; font-weight: 800; margin-bottom: 2px; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    padding: 20px 16px 40px;
    max-width: 800px;
    margin: 0 auto;
  }

  /* Card */
  .offer-card {
    background: #1a1050;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid #2a2060;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .offer-card:hover {
    transform: translateY(-4px);
    border-color: #3ea84f;
    box-shadow: 0 8px 24px rgba(62,168,79,0.3);
  }
  .offer-card:active { transform: scale(0.97); }

  .offer-card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }
  .offer-card-name {
    padding: 8px 10px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dl-badge {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(26,80,40,0.85);
    border: 1px solid #3ea84f;
    border-radius: 20px;
    padding: 3px 9px;
    font-size: 10px;
    font-weight: 700;
    color: #5be07a;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: rgba(255,255,255,0.4);
  }
  .empty .icon { font-size: 48px; margin-bottom: 14px; }
  .empty h2 { font-size: 18px; margin-bottom: 8px; color: rgba(255,255,255,0.6); }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* Fullscreen overlay */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .overlay.open { display: flex; }

  .overlay-img-wrap {
    position: relative;
    width: 100%;
    max-width: 340px;
  }
  /* 9:16 ratio canvas preview */
  .status-canvas {
    width: 100%;
    aspect-ratio: 9/16;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    background: #1a1050;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
  }
  .status-canvas .offer-img {
    width: 100%;
    height: 70%;
    object-fit: cover;
    display: block;
  }
  .status-canvas .brand-band {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30%;
    background: linear-gradient(135deg, #1a1050, #1a5228);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    gap: 4px;
  }
  .status-canvas .brand-band img {
    height: 32px;
    width: auto;
    display: block;
  }
  .status-canvas .brand-band .tagline {
    font-size: 10px;
    color: #5be07a;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .status-canvas .brand-band .contact {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    font-weight: 600;
    margin-top: 2px;
  }

  .overlay-actions {
    display: flex;
    gap: 12px;
    margin-top: 18px;
    width: 100%;
    max-width: 340px;
  }
  .btn-dl {
    flex: 1;
    background: linear-gradient(135deg, #1a5228, #3ea84f);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(62,168,79,0.4);
    transition: 0.2s;
  }
  .btn-dl:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(62,168,79,0.5); }
  .btn-close {
    background: #2a2060;
    color: #fff;
    border: 2px solid #3a3080;
    border-radius: 50px;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn-close:hover { background: #3a3080; }

  .overlay-hint {
    margin-top: 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    max-width: 340px;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 24px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
  }
</style>
</head>

var currentFile = '';

// ── Build grid ───────────────────────────────────────────────────
function buildGrid() {
  var grid = document.getElementById('offer-grid');

  if (!BANK_OFFERS || BANK_OFFERS.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="icon">🏦</div><h2>No Offers Yet</h2><p>Offers will appear here once the team uploads them.</p></div>';
    return;
  }

  grid.innerHTML = '';
  BANK_OFFERS.forEach(function(filename) {
    var label = filename
      .replace(/\.[^\.]+$/, '')
      .replace(/[-_]+/g, ' ')
      .replace(/\b\w/g, function(c){ return c.toUpperCase(); });

    var card = document.createElement('div');
    card.className = 'offer-card';
    card.onclick = function() { openOverlay(filename, label); };
    card.innerHTML =
      '<span class="dl-badge">📲 Status</span>' +
      '<img src="bank-offers/' + filename + '" alt="' + label + '" ' +
           'onerror="this.closest(\'.offer-card\').style.display=\'none\'">' +
      '<div class="offer-card-name">' + label + '</div>';
    grid.appendChild(card);
  });
}

// ── Open overlay ─────────────────────────────────────────────────
function openOverlay(filename, label) {
  currentFile = filename;
  document.getElementById('overlay-img').src = 'bank-offers/' + filename;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Download as WhatsApp Status (9:16) ───────────────────────────
function downloadStatus() {
  var img = document.getElementById('overlay-img');
  if (!img.complete || !img.naturalWidth) {
    alert('Image still loading, please wait...');
    return;
  }

  // Canvas at 1080x1920 (9:16 WhatsApp status)
  var W = 1080, H = 1920;
  var canvas = document.createElement('canvas');
  canvas.width  = W;
  canvas.height = H;
  var ctx = canvas.getContext('2d');

  // Offer image — top 70%
  var imgH = Math.round(H * 0.70);
  ctx.drawImage(img, 0, 0, W, imgH);

  // Brand band — bottom 30%
  var bandY = imgH;
  var bandH = H - imgH;

  // Gradient background
  var grad = ctx.createLinearGradient(0, bandY, W, H);
  grad.addColorStop(0, '#1a1050');
  grad.addColorStop(1, '#1a5228');
  ctx.fillStyle = grad;
  ctx.fillRect(0, bandY, W, bandH);

  // Green top border on band
  ctx.fillStyle = '#3ea84f';
  ctx.fillRect(0, bandY, W, 6);

  // Logo
  var logoImg = new Image();
  logoImg.onload = function() {
    var logoW = 420;
    var logoH = Math.round(logoImg.height * logoW / logoImg.width);
    var logoX = (W - logoW) / 2;
    var logoY = bandY + (bandH * 0.15);
    ctx.drawImage(logoImg, logoX, logoY, logoW, logoH);

    // Tagline
    ctx.fillStyle = '#5be07a';
    ctx.font = 'bold 52px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('EMPOWER YOUR DREAMS', W/2, bandY + bandH * 0.55);

    // Contact
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = '44px Arial';
    ctx.fillText('+91 93421 42370  |  Alangudi, Pudukkottai', W/2, bandY + bandH * 0.72);

    // Website
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '36px Arial';
    ctx.fillText('snsfinserv.in', W/2, bandY + bandH * 0.88);

    // Download
    var link = document.createElement('a');
    link.download = 'SNS_Offer_Status_' + currentFile.replace(/\.[^\.]+$/, '') + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
  logoImg.src = BRAND_LOGO;
}

// Close on backdrop click
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeOverlay();
});

document.addEventListener('DOMContentLoaded', buildGrid);
</script>

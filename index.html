<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .email-box {
            display: flex;
            justify-content: center;
        }
        input {
            padding: 10px;
            border: none;
            outline: none;
            width: 60%;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: #ff9800;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #e68900;
        }
        .footer {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Coming Soon</h1>
    <p>Our website is under construction. We’ll be live shortly!</p>

    <div class="email-box">
        <input type="email" placeholder="Enter your email">
        <button>Notify Me</button>
    </div>

    <div class="footer">
        © 2026 Your Company Name
    </div>
</div>

</body>
</html>

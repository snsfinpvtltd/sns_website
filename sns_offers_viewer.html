<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#fff; font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; }
.slides-wrap { position:fixed; inset:0; overflow:hidden; }
.slide { position:absolute; inset:0; display:flex; flex-direction:column; background:#fff; opacity:0; transform:translateX(100%); transition:transform 0.42s cubic-bezier(0.4,0,0.2,1), opacity 0.42s cubic-bezier(0.4,0,0.2,1); pointer-events:none; }
.slide.active { opacity:1; transform:translateX(0); pointer-events:auto; }
.slide.prev   { opacity:0; transform:translateX(-100%); }
.brand-top { flex-shrink:0; background:#fff; padding:6px 14px 5px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #e8eef5; box-shadow:0 2px 6px rgba(0,0,60,0.06); height:52px; }
.brand-top img { height:30px; width:auto; }
.slide-counter { font-size:12px; font-weight:700; color:#8898aa; letter-spacing:1px; }
.slide-counter b { color:#1e5a1e; }
.swoosh { flex-shrink:0; height:3px; background:linear-gradient(90deg,#00003c 0%,#1e5a1e 55%,#00003c 100%); }
.offer-image-wrap { flex:1; min-height:0; display:flex; align-items:center; justify-content:center; background:#fff; overflow:hidden; }
.offer-image-wrap img { width:100%; height:100%; object-fit:contain; object-position:center; display:block; }
.brand-bottom { flex-shrink:0; background:#00003c; padding:8px 16px 10px; text-align:center; }
.brand-bottom .tagline { font-size:9px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#4db84d; margin-bottom:3px; }
.brand-bottom .contact { font-size:11.5px; font-weight:600; color:rgba(255,255,255,0.82); margin-bottom:6px; }
.brand-bottom .contact a { color:#fff; text-decoration:none; }
.brand-bottom .apply-btn { display:inline-block; background:#1e5a1e; color:#fff; font-size:14px; font-weight:800; padding:9px 30px; border-radius:50px; text-decoration:none; border:1.5px solid #4db84d; box-shadow:0 3px 12px rgba(30,90,30,0.4); }
.dots-row { display:flex; justify-content:center; gap:7px; padding:7px 0 0; }
.dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.25); border:none; padding:0; cursor:pointer; transition:background .25s, transform .25s; }
.dot.active { background:#4db84d; transform:scale(1.5); }
.nav-btn { position:fixed; top:50%; transform:translateY(-50%); z-index:30; width:42px; height:42px; border-radius:50%; background:rgba(0,0,60,0.65); border:2px solid rgba(77,184,77,0.5); color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); transition:background .2s, transform .2s; }
.nav-btn:hover { background:#1e5a1e; transform:translateY(-50%) scale(1.1); }
.nav-btn:disabled { opacity:0.15; pointer-events:none; }
#btn-prev { left:8px; }
#btn-next { right:8px; }
.no-offers { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#fff; color:#8898aa; text-align:center; padding:40px; gap:14px; }
.no-offers img { height:52px; margin-bottom:8px; }
.no-offers h2 { font-size:20px; color:#00003c; }
.no-offers p  { font-size:14px; line-height:1.7; }
.wa-share-btn { position:fixed; bottom:20px; right:16px; z-index:40; background:#25D366; color:#fff; border:none; border-radius:50px; padding:10px 18px 10px 14px; font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; box-shadow:0 4px 14px rgba(37,211,102,0.45); cursor:pointer; text-decoration:none; }
.wa-share-btn svg { width:22px; height:22px; flex-shrink:0; }
</style>
</head>
<body>

<div class="slides-wrap" id="slides-wrap"></div>
<button class="nav-btn" id="btn-prev" onclick="nav(-1)">&#8592;</button>
<button class="nav-btn" id="btn-next" onclick="nav(1)">&#8594;</button>

  </svg>

<script>
// ================================================
//  UPDATE THIS LIST when offers change
// ================================================
var BANK_OFFERS = [
  "CIBIL.jpeg",
  "Idfc First Bank Offers.jpeg",
  "InCred Finance Offers.jpeg",
  "Indusind Bank Offers.jpeg",
  "Kotak Bank Offers.jpeg"
];

var PAGE_URL    = "https://www.snsfinserv.in/sns_offers_viewer.html";
var PAGE_TEXT   = "Exclusive loan & insurance offers from our partner banks. Tap to view & apply!";
var ENQUIRY_URL = "index_new.html#enquiry";

// SNS Logo (inline SVG - works without any external file)
var LOGO_ORIG = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMDAgODAiPgogIDxyZWN0IHdpZHRoPSIzMDAiIGhlaWdodD0iODAiIGZpbGw9IiNmZmYiLz4KICA8cG9seWdvbiBwb2ludHM9IjUsMTIgMzUsNDAgNSw2OCAyMCw2OCA1MCw0MCAyMCwxMiIgZmlsbD0iIzFlNWExZSIvPgogIDxwb2x5Z29uIHBvaW50cz0iMjgsMTIgNTgsNDAgMjgsNjggNDMsNjggNzMsNDAgNDMsMTIiIGZpbGw9IiM0ZGI4NGQiLz4KICA8dGV4dCB4PSI4NSIgeT0iNTIiIGZvbnQtZmFtaWx5PSJBcmlhbCBCbGFjayxBcmlhbCxzYW5zLXNlcmlmIiBmb250LXdlaWdodD0iOTAwIiBmb250LXNpemU9IjM2IiBmaWxsPSIjMDAwMDNjIj5TTlM8L3RleHQ+CiAgPHJlY3QgeD0iMTc4IiB5PSIxNCIgd2lkdGg9IjIuNSIgaGVpZ2h0PSI1MiIgZmlsbD0iI2M4YTg0YiIvPgogIDx0ZXh0IHg9IjE4OCIgeT0iMzQiIGZvbnQtZmFtaWx5PSJBcmlhbCxzYW5zLXNlcmlmIiBmb250LXdlaWdodD0iNzAwIiBmb250LXNpemU9IjEzLjUiIGZpbGw9IiMwMDAwM2MiIGxldHRlci1zcGFjaW5nPSIxIj5GaW5hbmNpYWw8L3RleHQ+CiAgPHRleHQgeD0iMTg4IiB5PSI1NCIgZm9udC1mYW1pbHk9IkFyaWFsLHNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSI3MDAiIGZvbnQtc2l6ZT0iMTMuNSIgZmlsbD0iIzFlNWExZSIgbGV0dGVyLXNwYWNpbmc9IjEiPlNlcnZpY2VzPC90ZXh0Pgo8L3N2Zz4=";

var cur = 0, slides = [];

function init() {
  var wrap = document.getElementById('slides-wrap');
  document.getElementById('wa-share').href = "https://wa.me/?text=" + encodeURIComponent(PAGE_TEXT + "\n" + PAGE_URL);

  if (!BANK_OFFERS || BANK_OFFERS.length === 0) {
    wrap.innerHTML =
      '<div class="no-offers">' +
        '<img src="' + LOGO_ORIG + '" alt="SNS">' +
        '<h2>No Offers Right Now</h2>' +
        '<p>Check back soon for exclusive offers.</p>' +
      '</div>';
    document.getElementById('btn-prev').style.display='none';
    document.getElementById('btn-next').style.display='none';
    return;
  }

  BANK_OFFERS.forEach(function(file, i) {
    var s = document.createElement('div');
    s.className = 'slide' + (i===0?' active':'');
    s.innerHTML =
      '<div class="brand-top">' +
        '<img src="' + LOGO_ORIG + '" alt="SNS Financial Services">' +
        '<div class="slide-counter"><b>'+(i+1)+'</b> / '+BANK_OFFERS.length+'</div>' +
      '</div>' +
      '<div class="swoosh"></div>' +
      '<div class="offer-image-wrap">' +
        '<img src="bank-offers/'+file+'" alt="Offer '+(i+1)+'" onerror="this.style.display=\'none\'">' +
      '</div>' +
      '<div class="swoosh"></div>' +
      '<div class="brand-bottom">' +
        '<div class="tagline">Empower Your Dreams</div>' +
        '<div class="contact">' +
          '<a href="tel:+919342142370">&#128222; +91 93421 42370</a>' +
          ' &nbsp;|&nbsp; Alangudi, Pudukkottai' +
        '</div>' +
        '<a class="apply-btn" href="'+ENQUIRY_URL+'">Apply Now &#8594;</a>' +
        (BANK_OFFERS.length>1 ? '<div class="dots-row" id="dr-'+i+'"></div>' : '') +
      '</div>';
    wrap.appendChild(s);
    slides.push(s);
  });

  if (BANK_OFFERS.length > 1) {
    for (var si=0; si<BANK_OFFERS.length; si++) {
      var bar = document.getElementById('dr-'+si);
      if (!bar) continue;
      for (var di=0; di<BANK_OFFERS.length; di++) {
        var d = document.createElement('button');
        d.className = 'dot' + (di===0?' active':'');
        d.onclick = (function(idx){ return function(){ goTo(idx); }; })(di);
        bar.appendChild(d);
      }
    }
  }

  updateNav();
  initSwipe();
}

function goTo(idx) {
  var p = slides[cur];
  p.classList.remove('active'); p.classList.add('prev');
  cur = Math.max(0, Math.min(idx, slides.length-1));
  slides[cur].classList.remove('prev'); slides[cur].classList.add('active');
  setTimeout(function(){ p.classList.remove('prev'); }, 450);
  document.querySelectorAll('.dots-row').forEach(function(bar) {
    bar.querySelectorAll('.dot').forEach(function(d,i){ d.classList.toggle('active', i===cur); });
  });
  updateNav();
}

function nav(dir) { goTo(cur+dir); }

function updateNav() {
  document.getElementById('btn-prev').disabled = (cur===0);
  document.getElementById('btn-next').disabled = (cur===slides.length-1);
}

function initSwipe() {
  var wrap=document.getElementById('slides-wrap'), sx=0, sy=0, t=0, locked=false;
  wrap.addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; t=Date.now(); locked=false; },{passive:true});
  wrap.addEventListener('touchmove',function(e){ var dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy; if(!locked && Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>10) locked=true; if(locked) e.preventDefault(); },{passive:false});
  wrap.addEventListener('touchend',function(e){ var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy; var dt=Date.now()-t; if(Math.abs(dx)>Math.abs(dy) && (Math.abs(dx)>35||(dt<300&&Math.abs(dx)>15))) nav(dx<0?1:-1); locked=false; },{passive:true});
}

document.addEventListener('DOMContentLoaded', init);
document.addEventListener('keydown', function(e){ if(e.key==='ArrowRight') nav(1); if(e.key==='ArrowLeft') nav(-1); });
</script>
</body>
</html>

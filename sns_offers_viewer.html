<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta property="og:title" content="SNS Financial Services – Latest Bank Offers">
<meta property="og:description" content="Exclusive loan offers from our partner banks. Swipe to browse.">
<title>SNS – Bank Offers</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#00003c;
    font-family:'Segoe UI', Arial, sans-serif;
  }

  /* ── Slide wrapper ── */
  .slides-wrap { width:100%; height:100vh; position:relative; overflow:hidden; }

  .slide {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    opacity:0; transform:translateX(100%);
    transition:transform 0.42s cubic-bezier(0.4,0,0.2,1),
                opacity  0.42s cubic-bezier(0.4,0,0.2,1);
    pointer-events:none;
  }
  .slide.active { opacity:1; transform:translateX(0); pointer-events:auto; }
  .slide.prev   { opacity:0; transform:translateX(-100%); }

  /* ── Top brand bar ── */
  .brand-top {
    flex-shrink:0;
    background:#00003c;
    padding:10px 20px 8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:3px solid #1e5a1e;
    position:relative;
  }
  /* navy-to-green swoosh accent line under logo bar */
  .brand-top::after {
    content:'';
    position:absolute;
    bottom:-3px; left:0; right:0; height:3px;
    background:linear-gradient(90deg, #00003c 0%, #1e5a1e 60%, #00003c 100%);
  }
  .brand-top img { height:36px; width:auto; display:block; }
  .slide-counter {
    font-size:12px; font-weight:700;
    color:rgba(255,255,255,0.45); letter-spacing:1px;
  }
  .slide-counter b { color:#4db84d; }

  /* ── Image area ── */
  .offer-image-wrap {
    flex:1; overflow:hidden; position:relative;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .offer-image-wrap img {
    width:100%; height:100%;
    object-fit:contain;
    object-position:center;
    display:block;
  }

  /* Green divider between image and bottom bar */
  .green-line {
    height:4px;
    flex-shrink:0;
    background:linear-gradient(90deg, #00003c 0%, #1e5a1e 50%, #00003c 100%);
  }

  /* ── Bottom brand band ── */
  .brand-bottom {
    flex-shrink:0;
    background:#00003c;
    padding:10px 20px 14px;
    text-align:center;
  }
  .brand-bottom .tagline {
    font-size:10px; font-weight:800; letter-spacing:2.5px;
    text-transform:uppercase; color:#4db84d; margin-bottom:4px;
  }
  .brand-bottom .contact {
    font-size:12.5px; font-weight:600;
    color:rgba(255,255,255,0.80);
  }
  .brand-bottom .contact a { color:#fff; text-decoration:none; }
  .brand-bottom .apply-btn {
    display:inline-block; margin-top:9px;
    background:#1e5a1e; color:#fff;
    font-size:13px; font-weight:800;
    padding:7px 28px; border-radius:50px;
    text-decoration:none; border:2px solid #4db84d;
    box-shadow:0 3px 14px rgba(30,90,30,0.45);
    transition:0.2s;
  }
  .brand-bottom .apply-btn:hover { background:#256825; }

  /* ── Progress dots ── */
  .dots-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    display:flex; justify-content:center; gap:7px;
    padding:8px 0 max(12px, env(safe-area-inset-bottom));
    pointer-events:none;
  }
  .dot {
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,0.18);
    border:none; padding:0; cursor:pointer; pointer-events:auto;
    transition:background 0.25s, transform 0.25s;
  }
  .dot.active { background:#4db84d; transform:scale(1.5); }

  /* ── Nav arrows (desktop) ── */
  .nav-btn {
    position:fixed; top:50%; transform:translateY(-50%);
    z-index:30; width:44px; height:44px; border-radius:50%;
    background:rgba(0,0,60,0.75);
    border:2px solid rgba(77,184,77,0.55);
    color:#fff; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
    transition:background 0.2s, transform 0.2s;
  }
  .nav-btn:hover { background:#1e5a1e; transform:translateY(-50%) scale(1.1); }
  .nav-btn:disabled { opacity:0.15; pointer-events:none; }
  .nav-btn.left  { left:10px; }
  .nav-btn.right { right:10px; }

  /* ── Swipe hint ── */
  .swipe-hint {
    position:fixed; bottom:52px; width:100%; text-align:center;
    font-size:11px; color:rgba(255,255,255,0.25); letter-spacing:1px;
    pointer-events:none;
    animation:hintFade 3.5s ease 1.5s forwards;
  }
  @keyframes hintFade { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

  /* ── No offers ── */
  .no-offers {
    height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#00003c; color:rgba(255,255,255,0.45);
    text-align:center; padding:40px; gap:14px;
  }
  .no-offers img { height:52px; margin-bottom:8px; }
  .no-offers h2 { font-size:20px; color:#fff; }
  .no-offers p  { font-size:14px; line-height:1.7; }
</style>
</head>
<body>

<div class="slides-wrap" id="slides-wrap"></div>
<div class="dots-bar"    id="dots-bar"></div>
<button class="nav-btn left"  id="btn-prev" onclick="nav(-1)">&#8592;</button>
<button class="nav-btn right" id="btn-next" onclick="nav(1)">&#8594;</button>
<div class="swipe-hint">&#8592;&nbsp; Swipe to browse offers &nbsp;&#8594;</div>

var ENQUIRY_URL = "sns_website_final_10.html#enquiry";

// ── State ──────────────────────────────────────────────
var cur = 0, slides = [];

function init() {
  var wrap = document.getElementById('slides-wrap');
  var dots = document.getElementById('dots-bar');

  if (!BANK_OFFERS || BANK_OFFERS.length === 0) {
    wrap.innerHTML =
      '<div class="no-offers">' +
        '<img src="' + LOGO_WHITE + '" alt="SNS">' +
        '<h2>No Offers Right Now</h2>' +
        '<p>Check back soon for exclusive offers.</p>' +
      '</div>';
    document.getElementById('btn-prev').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
    document.querySelector('.swipe-hint').style.display = 'none';
    return;
  }

  BANK_OFFERS.forEach(function(file, i) {
    var s = document.createElement('div');
    s.className = 'slide' + (i === 0 ? ' active' : '');
    s.innerHTML =
      '<div class="brand-top">' +
        '<img src="' + LOGO_WHITE + '" alt="SNS Financial Services">' +
        '<div class="slide-counter"><b>' + (i+1) + '</b> / ' + BANK_OFFERS.length + '</div>' +
      '</div>' +
      '<div class="offer-image-wrap">' +
        '<img src="bank-offers/' + file + '" alt="Offer ' + (i+1) + '" ' +
             'onerror="this.closest(\'.offer-image-wrap\').style.background=\'#f0f4f8\'">' +
      '</div>' +
      '<div class="green-line"></div>' +
      '<div class="brand-bottom">' +
        '<div class="tagline">Empower Your Dreams</div>' +
        '<div class="contact">' +
          '<a href="tel:+919342142370">&#128222; +91 93421 42370</a>' +
          ' &nbsp;|&nbsp; Alangudi, Pudukkottai' +
        '</div>' +
        '<a class="apply-btn" href="' + ENQUIRY_URL + '">Apply Now &#8594;</a>' +
      '</div>';
    wrap.appendChild(s);
    slides.push(s);

    var d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = (function(idx){ return function(){ goTo(idx); }; })(i);
    dots.appendChild(d);
  });

  updateNav();
  initSwipe();
}

function goTo(idx) {
  var p = slides[cur];
  p.classList.remove('active'); p.classList.add('prev');
  cur = Math.max(0, Math.min(idx, slides.length - 1));
  slides[cur].classList.remove('prev'); slides[cur].classList.add('active');
  setTimeout(function(){ p.classList.remove('prev'); }, 450);
  document.querySelectorAll('.dot').forEach(function(d,i){
    d.classList.toggle('active', i === cur);
  });
  updateNav();
}

function nav(dir) { goTo(cur + dir); }

function updateNav() {
  document.getElementById('btn-prev').disabled = (cur === 0);
  document.getElementById('btn-next').disabled = (cur === slides.length - 1);
}

function initSwipe() {
  var wrap = document.getElementById('slides-wrap'), sx=0, sy=0;
  wrap.addEventListener('touchstart', function(e){
    sx=e.touches[0].clientX; sy=e.touches[0].clientY;
  }, {passive:true});
  wrap.addEventListener('touchend', function(e){
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>40) nav(dx<0?1:-1);
  }, {passive:true});
}

document.addEventListener('DOMContentLoaded', init);
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight') nav(1);
  if(e.key==='ArrowLeft')  nav(-1);
});
</script>

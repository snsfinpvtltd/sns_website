<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:Segoe UI,Arial,sans-serif;color:#fff}
body{
  background:
    radial-gradient(circle at 15% 20%,rgba(37,211,102,.18),transparent 28%),
    radial-gradient(circle at 84% 12%,rgba(255,198,41,.16),transparent 24%),
    linear-gradient(140deg,#05130f 0%,#08192a 46%,#160b20 100%);
}
button,a{font:inherit}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  height:62px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;background:rgba(4,14,18,.78);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,215,0,.35);box-shadow:0 8px 30px rgba(0,0,0,.28)
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-logo{
  height:42px;width:auto;max-width:134px;display:block;object-fit:contain;
  filter:brightness(0) invert(1) drop-shadow(0 0 9px rgba(255,212,90,.55));
  animation:logoPulse 2.8s ease-in-out infinite
}
@keyframes logoPulse{50%{transform:scale(1.04);filter:brightness(0) invert(1) drop-shadow(0 0 16px rgba(37,211,102,.5))}}
.brand-text{min-width:0}
.brand-text strong{display:block;font-size:14px;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-text span{display:block;margin-top:3px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.58)}
.counter{font-size:12px;font-weight:900;letter-spacing:2px;color:rgba(255,255,255,.62)}
.counter b{color:#ffd45a}
.shine{height:4px;flex:0 0 auto;background:linear-gradient(90deg,#25d366,#ffd45a,#ff7a45,#ffd45a,#25d366);background-size:300% 100%;animation:shine 2.8s linear infinite}
@keyframes shine{to{background-position:300% 0}}
.stage{position:relative;flex:1;min-height:0;overflow:hidden}
.slide{
  position:absolute;inset:0;display:grid;grid-template-rows:1fr auto;opacity:0;pointer-events:none;
  transform:translate3d(10%,0,0) scale(.96) rotateY(-8deg);
  transition:opacity .55s ease,transform .7s cubic-bezier(.22,1,.36,1)
}
.slide.active{opacity:1;pointer-events:auto;transform:translate3d(0,0,0) scale(1) rotateY(0)}
.slide.exit{transform:translate3d(-9%,0,0) scale(.96) rotateY(8deg)}
.visual{position:relative;min-height:0;overflow:hidden;background:#04100d}
.blur{
  position:absolute;inset:-34px;background-size:cover;background-position:center;
  filter:blur(30px) brightness(.38) saturate(1.35);transform:scale(1.1)
}
.visual img{
  position:relative;z-index:2;width:100%;height:100%;object-fit:contain;display:block;
  filter:drop-shadow(0 18px 30px rgba(0,0,0,.3));animation:slowZoom 6s ease-out both
}
.active .visual img{animation-name:slowZoomActive}
@keyframes slowZoom{from{transform:scale(1.02)}to{transform:scale(1)}}
@keyframes slowZoomActive{from{transform:scale(1)}to{transform:scale(1.035)}}
.visual:before{
  content:"";position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,.22),transparent 22%,transparent 72%,rgba(2,9,12,.84));
}
.tag{
  position:absolute;z-index:4;top:14px;left:14px;padding:7px 12px;border-radius:999px;
  background:rgba(255,212,90,.94);color:#071411;font-size:10px;font-weight:1000;
  letter-spacing:1.3px;text-transform:uppercase;box-shadow:0 8px 22px rgba(255,212,90,.3);
  animation:tagFloat 2.4s ease-in-out infinite
}
@keyframes tagFloat{50%{transform:translateY(-4px)}}
.caption{
  position:absolute;left:16px;right:16px;bottom:18px;z-index:4;
  transform:translateY(22px);opacity:0;transition:transform .55s .18s ease,opacity .55s .18s ease
}
.active .caption{transform:translateY(0);opacity:1}
.caption h1{font-size:clamp(22px,6vw,34px);line-height:1.04;font-weight:1000;letter-spacing:0;text-shadow:0 4px 16px rgba(0,0,0,.55)}
.caption p{margin-top:7px;font-size:13px;font-weight:700;color:rgba(255,255,255,.88);text-shadow:0 2px 12px rgba(0,0,0,.55)}
.info-strip{

  background:rgba(255,255,255,.08);border-top:1px solid rgba(255,215,0,.22)
}
.info-item{padding:8px 4px;text-align:center;background:rgba(5,19,18,.72)}
.info-item strong{display:block;font-size:13px;color:#ffd45a}
.info-item span{display:block;margin-top:2px;font-size:8px;letter-spacing:.9px;text-transform:uppercase;color:rgba(255,255,255,.58)}
.cta{

.ticker span{display:inline-block;animation:ticker 10s linear infinite;white-space:nowrap}

.contact{display:flex;justify-content:center;align-items:center;gap:9px;margin-top:5px;font-size:12px;font-weight:800;color:rgba(255,255,255,.8)}
.contact a{color:#ffd45a;text-decoration:none}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:9px}
.enquire{grid-column:1/-1;background:linear-gradient(135deg,#1a56db,#6c2bd9)}
.btn{
  min-height:44px;border:0;border-radius:11px;text-decoration:none;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:1000;
  box-shadow:0 9px 24px rgba(0,0,0,.28);transition:transform .16s ease,filter .16s ease
}
.btn:active{transform:scale(.97);filter:brightness(1.08)}
.call{background:linear-gradient(135deg,#153e36,#24865f)}
.whatsapp{background:linear-gradient(135deg,#25d366,#128c7e)}

.dots{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;margin-bottom:2px}

.dot.active{width:26px;background:#ffd45a}
.caption-bar{
  flex:0 0 auto;padding:10px 16px 8px;text-align:center;

.caption-bar h1{font-size:clamp(15px,4.5vw,21px);font-weight:900;line-height:1.15;color:#fff;transition:opacity .4s ease}
.caption-bar p{margin-top:4px;font-size:12px;font-weight:600;color:rgba(255,255,255,.72);transition:opacity .4s ease}
.nav{
  position:fixed;z-index:8;top:50%;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,212,90,.45);
  background:rgba(3,13,18,.55);color:#ffd45a;display:grid;place-items:center;cursor:pointer;backdrop-filter:blur(8px);

}
.nav:hover{background:rgba(255,212,90,.18)}
.nav:active{transform:translateY(-50%) scale(.94)}
.prev{left:8px;transform:translateY(-50%)}
.next{right:8px;transform:translateY(-50%)}
.progress{position:fixed;left:0;bottom:0;z-index:12;height:3px;width:0;background:linear-gradient(90deg,#25d366,#ffd45a,#ff7a45);box-shadow:0 0 12px rgba(255,212,90,.58)}
.float-wa{
  position:fixed;right:14px;bottom:126px;z-index:9;width:54px;height:54px;border-radius:50%;
  display:grid;place-items:center;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;
  box-shadow:0 10px 30px rgba(37,211,102,.42);animation:waFloat 2.7s ease-in-out infinite
}
@keyframes waFloat{50%{transform:translateY(-7px)}}
.float-wa:before{content:"";position:absolute;inset:-7px;border:2px solid rgba(37,211,102,.35);border-radius:50%;animation:ring 2s ease-out infinite}
@keyframes ring{to{transform:scale(1.35);opacity:0}}
.swipe{position:fixed;left:50%;bottom:122px;z-index:7;transform:translateX(-50%);font-size:11px;font-weight:800;letter-spacing:1px;color:rgba(255,255,255,.58);animation:fadeAway 3s 2s forwards}
@keyframes fadeAway{to{opacity:0;visibility:hidden}}
@media (min-width:760px){
  .app{left:50%;width:min(460px,100vw);transform:translateX(-50%);box-shadow:0 0 0 1px rgba(255,255,255,.06),0 0 80px rgba(0,0,0,.42)}
  .float-wa{right:calc(50% - 216px)}
  .next{right:calc(50% - 222px)}
  .prev{left:calc(50% - 222px)}
}
@media (max-height:650px){
  .topbar{height:54px}.brand-logo{height:36px;max-width:116px}.caption h1{font-size:21px}.caption p{font-size:12px}
  .info-item{padding:5px 4px}.cta{padding:7px 12px 9px}.btn{min-height:39px}
}
</style>

<script>
var OFFERS = [
  {file:"bank-offers/12062026/1.jpeg", title:"Get the loan you deserve", sub:"Instant approval guidance with low EMI options"},
  {file:"bank-offers/12062026/2.jpeg", title:"Home loan support", sub:"Flexible tenure, bank comparison, quick process"},
  {file:"bank-offers/12062026/3.jpeg", title:"Vehicle loan offers", sub:"Drive home sooner with simple documentation"},
  {file:"bank-offers/12062026/4.jpeg", title:"Business loan solutions", sub:"Working capital support for growing businesses"},
  {file:"bank-offers/12062026/5.jpeg", title:"Education loan guidance", sub:"Plan the future with trusted loan assistance"},
  {file:"bank-offers/12062026/6.jpeg", title:"Personal loan offers", sub:"Quick disbursal with minimal paperwork"},
  {file:"bank-offers/12062026/7.jpeg", title:"Mortgage loan support", sub:"Unlock the value of your property with ease"}
];
var PHONE = "919342142370";
var PAGE_URL = "https://www.snsfinserv.in/new_sns_loan_offers.html";
var AUTO_DELAY = 5200;
var stage = document.getElementById("stage");
var dotsWrap = document.getElementById("dots");
var progress = document.getElementById("progress");
var currentNo = document.getElementById("currentNo");
var totalNo = document.getElementById("totalNo");
var tickerText = document.getElementById("tickerText");
var shareLink = document.getElementById("shareLink");
var applyLink = document.getElementById("applyLink");
var captionTitle = document.getElementById("captionTitle");
var captionSub = document.getElementById("captionSub");
var slides = [];
var dots = [];
var current = 0;
var timer = null;
var raf = null;
var started = 0;
totalNo.textContent = OFFERS.length;

OFFERS.forEach(function(offer,index){
  var slide = document.createElement("article");
  slide.className = "slide" + (index === 0 ? " active" : "");
  slide.innerHTML =
    '<div class="visual">' +
      '<div class="blur" style="background-image:url(\'' + offer.file + '\')"></div>' +
      '<img src="' + offer.file + '" alt="' + offer.title + '" loading="' + (index === 0 ? "eager" : "lazy") + '">' +
      '<div class="tag">Limited Offer</div>' +
    '</div>';
  stage.appendChild(slide);
  slides.push(slide);

  var dot = document.createElement("button");
  dot.className = "dot" + (index === 0 ? " active" : "");
  dot.type = "button";
  dot.setAttribute("aria-label","Show offer " + (index + 1));
  dot.addEventListener("click",function(){goTo(index,true)});
  dotsWrap.appendChild(dot);
  dots.push(dot);
});

function goTo(next,userAction){
  slides[current].classList.remove("active");
  slides[current].classList.add("exit");
  dots[current].classList.remove("active");
  current = (next + OFFERS.length) % OFFERS.length;
  slides[current].classList.remove("exit");
  slides[current].classList.add("active");
  dots[current].classList.add("active");
  currentNo.textContent = current + 1;
  setTimeout(function(){
    slides.forEach(function(slide,index){
      if(index !== current) slide.classList.remove("exit");
    });
  },700);
  updateLinks();
  if(userAction) restartAuto();
}

function nextSlide(){goTo(current + 1,false)}
function prevSlide(){goTo(current - 1,true)}
document.getElementById("nextBtn").addEventListener("click",function(){goTo(current + 1,true)});
document.getElementById("prevBtn").addEventListener("click",prevSlide);

function updateLinks(){
  var offer = OFFERS[current];
  captionTitle.textContent = offer.title;
  captionSub.textContent = offer.sub;
  tickerText.textContent = offer.title + " - " + offer.sub + " - SNS Financial Services";
  var applyText = encodeURIComponent("Hi SNS Financial Services, I want to apply for: " + offer.title + ". Please share details.");
  var shareText = encodeURIComponent("Check this SNS Financial loan offer: " + offer.title + "\n" + offer.sub + "\n" + PAGE_URL);
  applyLink.href = "https://wa.me/" + PHONE + "?text=" + applyText;
  shareLink.href = "https://wa.me/?text=" + shareText;
}

function tick(){
  var pct = Math.min((Date.now() - started) / AUTO_DELAY,1);
  progress.style.width = (pct * 100) + "%";
  if(pct < 1) raf = requestAnimationFrame(tick);
}

function restartAuto(){
  if(timer) clearTimeout(timer);
  if(raf) cancelAnimationFrame(raf);
  progress.style.width = "0%";
  started = Date.now();
  raf = requestAnimationFrame(tick);
  timer = setTimeout(function(){
    nextSlide();
    restartAuto();
  },AUTO_DELAY);
}

var touchX = 0;
var touchY = 0;
document.addEventListener("touchstart",function(e){
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
},{passive:true});
document.addEventListener("touchend",function(e){
  var dx = e.changedTouches[0].clientX - touchX;
  var dy = Math.abs(e.changedTouches[0].clientY - touchY);
  if(Math.abs(dx) > 42 && dy < 82) goTo(current + (dx < 0 ? 1 : -1),true);
},{passive:true});
document.addEventListener("keydown",function(e){
  if(e.key === "ArrowRight") goTo(current + 1,true);
  if(e.key === "ArrowLeft") goTo(current - 1,true);
});

(function(){
  var canvas = document.getElementById("stars");
  var ctx = canvas.getContext("2d");
  var points = [];
  var w = 0;
  var h = 0;
  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    points = [];
    for(var i=0;i<70;i++){
      points.push({
        x:Math.random()*w,
        y:Math.random()*h,
        r:.6+Math.random()*2.2,
        vx:-.18+Math.random()*.36,
        vy:-.15-Math.random()*.55,
        a:.18+Math.random()*.52
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    points.forEach(function(p){
      p.x += p.vx;
      p.y += p.vy;
      if(p.y < -8){p.y = h + 8;p.x = Math.random()*w}
      if(p.x < -8)p.x = w + 8;
      if(p.x > w + 8)p.x = -8;
      var g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);
      g.addColorStop(0,"rgba(255,216,92," + p.a + ")");
      g.addColorStop(1,"rgba(37,211,102,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*4,0,Math.PI*2);
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener("resize",resize);
  resize();
  draw();
})();

updateLinks();
restartAuto();
</script>
